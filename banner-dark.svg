<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="240">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0E1A" />
      <stop offset="50%" stop-color="#121829" />
      <stop offset="100%" stop-color="#1A233D" />
    </linearGradient>
    
    <!-- Title Text Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="50%" stop-color="#818CF8" />
      <stop offset="100%" stop-color="#F43F5E" />
    </linearGradient>
    
    <!-- Wave Glow Gradient -->
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#F43F5E" stop-opacity="0.05" />
    </linearGradient>
    
    <linearGradient id="glowGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.0" />
    </linearGradient>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap');
      
      .title {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 800;
        font-size: 36px;
        fill: url(#textGrad);
        letter-spacing: 2px;
      }
      
      .subtitle {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 500;
        font-size: 16px;
        fill: #94A3B8;
        letter-spacing: 1.5px;
      }

      .badge {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 700;
        font-size: 11px;
        fill: #38BDF8;
        letter-spacing: 2px;
      }
      
      /* Creative Artist's Wave Animations */
      .wave {
        animation: waveAnim 8s ease-in-out infinite alternate;
        transform-origin: center;
      }
      .wave-2 {
        animation: waveAnim2 12s ease-in-out infinite alternate;
        transform-origin: center;
      }
      
      @keyframes waveAnim {
        0% { transform: translateY(0px) scaleY(1); }
        100% { transform: translateY(-12px) scaleY(1.08); }
      }
      @keyframes waveAnim2 {
        0% { transform: translateY(0px) rotate(0deg); }
        100% { transform: translateY(8px) rotate(3deg); }
      }
      
      /* Technical Node Pulsing Animations */
      .node {
        animation: pulse 3s infinite alternate;
      }
      .link {
        stroke-dasharray: 5;
        animation: dash 30s linear infinite;
      }
      
      @keyframes pulse {
        0% { r: 3.5px; opacity: 0.4; }
        100% { r: 6.5px; opacity: 0.9; fill: #F43F5E; }
      }
      @keyframes dash {
        to {
          stroke-dashoffset: -1000;
        }
      }
    </style>
  </defs>

  <!-- Card Background -->
  <rect width="100%" height="100%" rx="16" fill="url(#bgGrad)" />
  <rect width="100%" height="100%" rx="16" stroke="url(#textGrad)" stroke-width="1.5" fill="none" opacity="0.25" />

  <!-- Artist's Wave (Creative Side - Right) -->
  <path class="wave-2" d="M 400 240 C 520 180, 580 100, 680 140 C 740 170, 760 70, 800 30 L 800 240 Z" fill="url(#glowGrad2)" />
  <path class="wave" d="M 460 240 C 560 140, 620 160, 700 90 C 750 40, 780 70, 800 10 L 800 240 Z" fill="url(#glowGrad)" />

  <!-- Engineer's Network (Technical Side - Connected Nodes) -->
  <g stroke="#38BDF8" stroke-width="0.75" opacity="0.35">
    <line class="link" x1="60" y1="50" x2="130" y2="85" />
    <line class="link" x1="130" y1="85" x2="200" y2="40" />
    <line class="link" x1="130" y1="85" x2="110" y2="185" />
    <line class="link" x1="110" y1="185" x2="210" y2="160" />
    <line class="link" x1="210" y1="160" x2="200" y2="40" />
    <line class="link" x1="210" y1="160" x2="280" y2="110" />
    <line class="link" x1="200" y1="40" x2="280" y2="110" />
  </g>
  <circle class="node" cx="60" cy="50" r="4" fill="#38BDF8" style="animation-delay: 0s;" />
  <circle class="node" cx="130" cy="85" r="5.5" fill="#818CF8" style="animation-delay: 0.5s;" />
  <circle class="node" cx="200" cy="40" r="4" fill="#F43F5E" style="animation-delay: 1s;" />
  <circle class="node" cx="110" cy="185" r="4" fill="#38BDF8" style="animation-delay: 1.5s;" />
  <circle class="node" cx="210" cy="160" r="4.5" fill="#818CF8" style="animation-delay: 2s;" />
  <circle class="node" cx="280" cy="110" r="4" fill="#F43F5E" style="animation-delay: 2.5s;" />

  <!-- Info Text Overlay (Left Aligned for Balance) -->
  <g transform="translate(80, 0)">
    <text x="0" y="80" class="badge">UNIVERSITY OF MORATUWA CSE</text>
    <text x="0" y="125" class="title">NATHASHA NETHMINI</text>
    <text x="0" y="165" class="subtitle">Artist's Heart • Engineer's Brain</text>
  </g>
</svg>
